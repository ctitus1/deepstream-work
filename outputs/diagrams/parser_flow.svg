<text x="1015" y="495" class="node-body">show person boxes</text>
<text x="1015" y="518" class="node-body">and confidence</text>
<rect x="1280" y="433" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
