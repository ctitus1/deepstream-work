<rect x="300" y="320" width="1260" height="382" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.6" stroke-dasharray="7 7"/>
<text x="316" y="688" class="group-label">src/deepstream_yolo/pipeline.py + probe helpers</text>
<rect x="340" y="120" width="190" height="112" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
