<text x="1015" y="240" class="node-body">boxes + injuries</text>
<text x="1015" y="263" class="node-body">timing + playback</text>
<rect x="1280" y="178" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
