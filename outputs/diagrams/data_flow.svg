<text x="815" y="402" class="node-body">nvinfer PGIE</text>
<text x="815" y="425" class="node-body">person ids + conf</text>
<rect x="1030" y="340" width="190" height="112" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
