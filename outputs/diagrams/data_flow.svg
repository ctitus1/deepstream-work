<text x="1045" y="402" class="node-body">detect tee -> 640x368</text>
<text x="1045" y="425" class="node-body">scaled bbox metadata</text>
<rect x="800" y="530" width="190" height="112" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="815" y="560" class="node-title">Injury model</text>
<text x="815" y="592" class="node-body">nvinfer SGIE</text>
<text x="815" y="615" class="node-body">per-person tensors</text>
<rect x="1030" y="530" width="190" height="112" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="1045" y="560" class="node-title">Assess appsink</text>
<text x="1045" y="592" class="node-body">assess tee -> 640x368</text>
<text x="1045" y="615" class="node-body">labels/probabilities</text>
<rect x="1330" y="340" width="190" height="112" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="1345" y="370" class="node-title">TCP senders</text>
<text x="1345" y="402" class="node-body">FrameSocketSender</text>
<text x="1345" y="425" class="node-body">5609 | 5610 | 5611</text>
<rect x="1560" y="340" width="190" height="112" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="1575" y="370" class="node-title">ROS publishers</text>
<text x="1575" y="402" class="node-body">one node per endpoint</text>
<text x="1575" y="425" class="node-body">copy source stamp</text>
<rect x="1790" y="340" width="270" height="112" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
