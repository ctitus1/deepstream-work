<text x="1295" y="495" class="node-body">combine boxes/text</text>
<text x="1295" y="518" class="node-body">prepare display</text>
<rect x="1640" y="433" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
