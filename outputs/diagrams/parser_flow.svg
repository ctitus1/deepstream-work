<text x="1655" y="518" class="node-body">or no-window mode</text>
<rect x="720" y="608" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="735" y="638" class="node-title">Check injuries</text>
