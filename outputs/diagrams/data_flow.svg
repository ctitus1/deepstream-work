<rect x="0" y="0" width="2370" height="760" fill="#0b1120"/>
<text x="40" y="42" class="title">ROS Publisher Data Flow</text>
<text x="40" y="72" class="subtitle">ros_source.py joins DeepStream JPEG appsinks with metadata; ros_bridge.py publishes ROS Humble topics.</text>
<rect x="0" y="300" width="270" height="192" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.6" stroke-dasharray="7 7"/>
<text x="16" y="478" class="group-label">scripts/start_rtsp_stream.sh</text>
<rect x="300" y="110" width="960" height="572" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.6" stroke-dasharray="7 7"/>
<text x="316" y="668" class="group-label">src/ros_source.py + src/deepstream_yolo/pipeline.py</text>
<rect x="1290" y="300" width="1040" height="192" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.6" stroke-dasharray="7 7"/>
<text x="1306" y="478" class="group-label">src/ros_bridge.py</text>
<rect x="40" y="340" width="190" height="112" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
