<svg xmlns="http://www.w3.org/2000/svg" width="2800" height="743" viewBox="0 0 2800 743">
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
<path d="M2,2 L10,6 L2,10 z" fill="#94a3b8"/>
</marker>
</defs>
<style>
.title{font:700 24px Arial,sans-serif;fill:#e5e7eb}
.subtitle{font:13px Arial,sans-serif;fill:#a7b0be}
.group-label{font:700 14px Arial,sans-serif;fill:#a7b0be}
.node-title{font:700 17px Arial,sans-serif;fill:#e5e7eb}
.node-body{font:13px Arial,sans-serif;fill:#a7b0be}
</style>
<rect x="0" y="0" width="2800" height="743" fill="#0b1120"/>
<text x="40" y="64" class="title">ROS Publisher Flow</text>
<text x="40" y="87" class="subtitle">DeepStream turns video into images, person boxes, and injury checks; ROS publishes them for tools to view or record.</text>
<rect x="40" y="313" width="320" height="215" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.6" stroke-dasharray="7 7"/>
<text x="56" y="514" class="group-label">Video starter: scripts/start_rtsp_stream.sh</text>
<rect x="400" y="138" width="1160" height="565" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.6" stroke-dasharray="7 7"/>
<text x="416" y="689" class="group-label">DeepStream sender: src/ros_source.py + pipeline.py</text>
<rect x="1600" y="313" width="1160" height="215" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.6" stroke-dasharray="7 7"/>
<text x="1616" y="514" class="group-label">ROS publisher: src/ros_bridge.py</text>
<rect x="80" y="353" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="95" y="383" class="node-title">Video input</text>
<text x="95" y="415" class="node-body">camera stream</text>
<text x="95" y="438" class="node-body">or saved video</text>
<rect x="440" y="353" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="455" y="383" class="node-title">Read frames</text>
<text x="455" y="415" class="node-body">open the video</text>
<text x="455" y="438" class="node-body">one frame at a time</text>
<rect x="720" y="353" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="735" y="383" class="node-title">Frame time</text>
<text x="735" y="415" class="node-body">save the source time</text>
<text x="735" y="438" class="node-body">keep it with frame</text>
<rect x="1280" y="178" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="1295" y="208" class="node-title">Plain image</text>
<text x="1295" y="240" class="node-body">resize to 640x368</text>
<text x="1295" y="263" class="node-body">send as JPEG</text>
<rect x="1000" y="353" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="1015" y="383" class="node-title">Find people</text>
<text x="1015" y="415" class="node-body">draw person boxes</text>
<text x="1015" y="438" class="node-body">add score + id</text>
<rect x="1280" y="353" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="1295" y="383" class="node-title">Detection image</text>
<text x="1295" y="415" class="node-body">resize with boxes</text>
<text x="1295" y="438" class="node-body">send box data</text>
<rect x="1000" y="528" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="1015" y="558" class="node-title">Check injuries</text>
<text x="1015" y="590" class="node-body">look at each person</text>
<text x="1015" y="613" class="node-body">make injury scores</text>
<rect x="1280" y="528" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="1295" y="558" class="node-title">Assessment image</text>
<text x="1295" y="590" class="node-body">one image/person</text>
<text x="1295" y="613" class="node-body">send injury labels</text>
<rect x="1640" y="353" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="1655" y="383" class="node-title">Send to bridge</text>
<text x="1655" y="415" class="node-body">three local ports</text>
<text x="1655" y="438" class="node-body">raw | boxes | injury</text>
<rect x="1920" y="353" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="1935" y="383" class="node-title">Make ROS messages</text>
<text x="1935" y="415" class="node-body">one publisher each</text>
<text x="1935" y="438" class="node-body">reuse frame time</text>
<rect x="2200" y="353" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="2215" y="383" class="node-title">Published topics</text>
<text x="2215" y="415" class="node-body">/uas4/image</text>
<text x="2215" y="438" class="node-body">/uas4/target_detections</text>
<text x="2215" y="461" class="node-body">/casualty_image/...</text>
<rect x="2480" y="353" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="2495" y="383" class="node-title">View or record</text>
<text x="2495" y="415" class="node-body">Foxglove</text>
<text x="2495" y="438" class="node-body">rosbag -s mcap</text>
