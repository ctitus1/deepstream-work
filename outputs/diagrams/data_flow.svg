<text x="55" y="402" class="node-body">RTSP camera</text>
<text x="55" y="425" class="node-body">or local MP4</text>
<rect x="340" y="340" width="190" height="112" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
<text x="355" y="370" class="node-title">Decode + mux</text>
<text x="355" y="402" class="node-body">parser -> decoder</text>
<text x="355" y="425" class="node-body">nvstreammux</text>
<rect x="570" y="340" width="190" height="112" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
