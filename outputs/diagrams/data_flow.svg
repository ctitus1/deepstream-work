<text x="1805" y="425" class="node-body">/uas4/target_detections</text>
<text x="1805" y="448" class="node-body">/casualty_image/...</text>
<rect x="2100" y="340" width="190" height="112" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
