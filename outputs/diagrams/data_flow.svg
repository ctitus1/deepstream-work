<path d="M 1520.0 420.5 L 1640.0 420.5" fill="none" stroke="#94a3b8" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 1520.0 595.5 L 1580.0 595.0 L 1580.0 454.0 L 1640.0 454.2" fill="none" stroke="#94a3b8" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 1880.0 420.5 L 1920.0 420.5" fill="none" stroke="#94a3b8" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 2160.0 420.5 L 2200.0 420.5" fill="none" stroke="#94a3b8" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 2440.0 420.5 L 2480.0 420.5" fill="none" stroke="#94a3b8" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
