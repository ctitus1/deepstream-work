<text x="1045" y="182" class="node-body">keyboard controls</text>
<text x="1045" y="205" class="node-body">bus messages</text>
<rect x="40" y="360" width="190" height="112" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
