<text x="455" y="240" class="node-body">choose models</text>
<text x="455" y="263" class="node-body">make configs</text>
<rect x="720" y="178" width="240" height="135" rx="8" fill="#111827" stroke="#38bdf8" stroke-width="1.8"/>
